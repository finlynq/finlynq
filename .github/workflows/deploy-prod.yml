name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.PROD_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://finlynq.com

  deploy:
    permissions:
      issues: write
    name: Deploy to finlynq.com
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: production
      url: https://finlynq.com

    steps:
      - name: Deploy via SSH
        # Pinned to commit SHA for v1.2.0 — stops a tag move from
        # silently swapping the action used to ship to production.
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            sudo bash /home/projects/pf/deploy.sh

      - name: Verify deployment
        # Pinned to commit SHA for v1.2.0 — stops a tag move from
        # silently swapping the action used to ship to production.
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            echo "==> Service status:"
            sudo systemctl status pf --no-pager -l
            echo ""
            curl -sf http://localhost:3456/api/healthz -o /dev/null -w "Production HTTP %{http_code}\n" || \
            echo "Note: app may still be warming up"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Production deploy failed',
              body: `Deploy failed on commit ${context.sha}.\n\n**Rollback:** restore latest backup from \`/opt/finlynq-backups/\` on the server and revert the merge commit.\n\n[View failed run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'critical']
            })
