name: Deploy Dev

on:
  push:
    branches: [dev]
    # A mobile-only commit must NOT trigger a web build + SSH redeploy of
    # dev.finlynq.com. Commits that touch any non-mobile path still deploy.
    paths-ignore:
      - 'mobile/**'

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  validate:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.DEV_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://dev.finlynq.com

  deploy:
    name: Deploy to dev.finlynq.com
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: dev
      url: https://dev.finlynq.com

    steps:
      - name: Deploy via SSH
        # Pinned to commit SHA for v1.2.0 — stops a tag move from
        # silently swapping the action used to ship to dev.
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            set -e
            cd /home/projects/pf-dev
            # Derive the service account from the checkout's ownership so this
            # workflow never needs editing if the account is renamed.
            OWNER=$(stat -c '%U' /home/projects/pf-dev/.git)
            # Switch the dev clone to the dev branch (idempotent — first run sets it up,
            # subsequent runs are no-ops). Run as the repo owner so the .git tree's
            # ownership stays consistent with the running service user.
            sudo -u "$OWNER" git fetch origin dev
            # Force the dev clone to EXACTLY match origin/dev, discarding any local
            # working-tree drift. The clone is a pristine mirror; the only local
            # diffs are regenerated files (package-lock.json via `npm install`, the
            # MCP tools catalog, etc.). `checkout -f` discards tracked drift so the
            # branch switch can't abort on a local-mod conflict; `reset --hard` then
            # pins it. Untracked files (.env, node_modules, .next) are preserved.
            # This mirrors the robust stash+reset pattern deploy.sh already uses on
            # the non-skip-pull (prod) path.
            #
            # Replaces a targeted `git checkout -- package-lock.json <tools.generated.ts>`
            # pre-sweep that silently no-op'd once tools.generated.ts became untracked:
            # `git checkout --` with one non-matching pathspec aborts the WHOLE checkout,
            # so package-lock.json was never cleaned and `git checkout -B dev origin/dev`
            # wedged on "local changes would be overwritten" (hit 2026-06-04; earlier
            # 2026-05-21 on the FINLYNQ-84 tail-commit deploy).
            sudo -u "$OWNER" git checkout -f -B dev origin/dev
            sudo -u "$OWNER" git reset --hard origin/dev
            # Now run the (newly-pulled) deploy.sh — auto-detects to pf-dev service.
            # --skip-pull because we already pulled above (avoids a double git operation).
            sudo bash /home/projects/pf-dev/deploy.sh --skip-pull

      - name: Verify deployment
        # Pinned to commit SHA for v1.2.0 — stops a tag move from
        # silently swapping the action used to ship to dev.
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            echo "==> pf-dev service status:"
            sudo systemctl status pf-dev --no-pager -l | head -20
            echo ""
            curl -sf http://localhost:3458/api/healthz -o /dev/null -w "Dev HTTP %{http_code}\n" || \
              echo "Note: app may still be warming up"
