name: Deploy Dev

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  validate:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.DEV_NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://dev.finlynq.com

  deploy:
    name: Deploy to dev.finlynq.com
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: dev
      url: https://dev.finlynq.com

    steps:
      - name: Deploy via SSH
        # Pinned to commit SHA for v1.2.0 — stops a tag move from
        # silently swapping the action used to ship to dev.
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            set -e
            cd /home/projects/pf-dev
            # Switch the dev clone to the dev branch (idempotent — first run sets it up,
            # subsequent runs are no-ops). Run as paperclip-agent so the .git tree's
            # ownership stays consistent with the running service user.
            sudo -u paperclip-agent git fetch origin dev
            sudo -u paperclip-agent git checkout -B dev origin/dev
            sudo -u paperclip-agent git reset --hard origin/dev
            # Now run the (newly-pulled) deploy.sh — auto-detects to pf-dev service.
            # --skip-pull because we already pulled above (avoids a double git operation).
            sudo bash /home/projects/pf-dev/deploy.sh --skip-pull

      - name: Verify deployment
        # Pinned to commit SHA for v1.2.0 — stops a tag move from
        # silently swapping the action used to ship to dev.
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            echo "==> pf-dev service status:"
            sudo systemctl status pf-dev --no-pager -l | head -20
            echo ""
            curl -sf http://localhost:3458/api/healthz -o /dev/null -w "Dev HTTP %{http_code}\n" || \
              echo "Note: app may still be warming up"
