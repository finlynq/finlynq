name: Bug Report
description: Report a bug in Finlynq
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Finlynq version
      placeholder: e.g. 0.1.0
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Docker (self-hosted)
        - Manual Node.js (self-hosted)
        - finlynq.com (hosted)
