worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Structured access logging ──────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$http_cf_connecting_ip",'   # Real IP via Cloudflare
            '"request":"$request",'
            '"status":"$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_time":"$request_time",'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    # ── Cloudflare real-IP restoration ────────────────────────────────────────
    # Trust Cloudflare's IP ranges and restore real visitor IP from CF-Connecting-IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # ── Upstream: Next.js app ─────────────────────────────────────────────────
    upstream nextjs {
        server app:3000;
        keepalive 32;
    }

    # ── HTTP: redirect all traffic to HTTPS ───────────────────────────────────
    # In front of Cloudflare (Full/Full Strict mode), Cloudflare terminates TLS.
    # Nginx handles the origin → Cloudflare leg. Redirect HTTP to HTTPS here so
    # any direct hits also upgrade.
    server {
        listen 80;
        server_name _;

        # Allow health check from Docker without redirect
        location = /api/healthz {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: main application ────────────────────────────────────────────────
    # SSL certificates should be placed in ./nginx/ssl/
    # In Cloudflare Full (strict) mode, use an origin certificate from Cloudflare.
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/origin.crt;
        ssl_certificate_key /etc/nginx/ssl/origin.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers (supplement Next.js middleware headers)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Max upload size (for import/CSV files)
        client_max_body_size 50M;

        # ── Static assets (Next.js) ────────────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── Health check (no auth, no logging) ────────────────────────────────
        location = /api/healthz {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── All other requests ─────────────────────────────────────────────────
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Pass Cloudflare country header for future geo-blocking if needed
            proxy_set_header CF-IPCountry      $http_cf_ipcountry;

            proxy_read_timeout  60s;
            proxy_connect_timeout 10s;

            # WebSocket support (for future use)
            proxy_set_header Upgrade    $http_upgrade;
        }
    }
}
