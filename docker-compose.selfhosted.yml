# Self-hosted single-container deployment (SQLite mode)
# Usage: docker compose -f docker-compose.selfhosted.yml up -d
#
# No external database required — data is stored in a local SQLite file,
# encrypted with the passphrase you set on first launch.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pf-app:selfhosted
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PF_DATA_DIR: /app/data
    volumes:
      - pf-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pf-data:
    driver: local
